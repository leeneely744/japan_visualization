<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Data Viz</title>

  <!-- FlatGeobuf -->
  <script src="https://unpkg.com/flatgeobuf@3.30.0/dist/flatgeobuf-geojson.min.js"></script>

  <!-- deck.gl & MapLibre -->
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="loading-title">Japan Data Viz</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
</div>

<!-- Map -->
<div id="map-container"></div>

<!-- Header -->
<div id="header">
  <div class="logo">Japan Data Viz</div>
  <div class="separator"></div>
  <div class="subtitle">deck.gl · MapLibre GL · FlatGeobuf</div>
</div>

<!-- Stats -->
<div id="stats">
  <div class="stat-card">
    <div class="stat-label">都道府県数</div>
    <div class="stat-value" id="stat-count">—</div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<script>
// ─────────────────────────────────────────────
//  FlatGeobuf を読み込み GeoJSON に変換
// ─────────────────────────────────────────────
async function loadFGB(url, onProgress) {
  const res = await fetch(url);
  const total = parseInt(res.headers.get('content-length') || '0');
  const features = [];
  let loaded = 0;

  // flatgeobuf.deserialize は response.body (ReadableStream) を受け取る
  for await (const feature of flatgeobuf.deserialize(res.body)) {
    features.push(feature);
    loaded++;
    if (onProgress) onProgress(loaded);
  }

  return { type: 'FeatureCollection', features };
}

// ─────────────────────────────────────────────
//  deck.gl 初期化
// ─────────────────────────────────────────────
const { DeckGL, GeoJsonLayer } = deck;

const deckgl = new DeckGL({
  container: 'map-container',
  mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  initialViewState: {
    longitude: 137.0,
    latitude:  36.5,
    zoom:       5.0,
    pitch:      0,
    bearing:    0,
  },
  controller: true,
  layers: [],
  onHover: ({ object, x, y }) => {
    const tip = document.getElementById('tooltip');
    if (!object) {
      tip.style.display = 'none';
      return;
    }
    const p = object.properties || {};
    // プロパティ名は FGB の中身に依存するため、あるものを全部表示
    const name = p.N03_001 || p.name || p.pref_name || p.prefecture || Object.values(p)[0] || '—';
    tip.style.display = 'block';
    tip.style.left = (x + 14) + 'px';
    tip.style.top  = (y + 14) + 'px';
    tip.innerHTML = `<div class="tt-name">${name}</div>`;
  },
});

// ─────────────────────────────────────────────
//  データ読み込み → レイヤー生成
// ─────────────────────────────────────────────
const loadingBar = document.getElementById('loading-bar');

loadFGB('./geo/neatogeo_prefectures.fgb', (count) => {
  // 47都道府県を基準に進捗表示
  loadingBar.style.width = Math.min(count / 47 * 100, 95) + '%';
})
.then(geojson => {
  document.getElementById('stat-count').innerHTML =
    `${geojson.features.length}<span>都道府県</span>`;

  // 最初の feature のプロパティをコンソールで確認
  console.log('[FGB] first feature properties:', geojson.features[0]?.properties);

  const layer = new GeoJsonLayer({
    id: 'prefectures',
    data: geojson,
    filled: true,
    stroked: true,
    getFillColor: [20, 50, 80, 60],
    getLineColor: [0, 229, 255, 200],
    getLineWidth: 800,         // メートル単位
    lineWidthMinPixels: 1,
    lineWidthMaxPixels: 3,
    pickable: true,
    autoHighlight: true,
    highlightColor: [0, 229, 255, 60],
  });

  deckgl.setProps({ layers: [layer] });

  loadingBar.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 400);
})
.catch(err => {
  console.error('[FGB] 読み込みエラー:', err);
  document.getElementById('loading').innerHTML =
    `<div class="loading-title" style="color:#ff6b35">読み込みに失敗しました</div>
     <div style="font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:12px">${err.message}</div>`;
});
</script>
</body>
</html>
