# 開発用アプリはこの Compose 経由で起動することを前提にしています（make up）。
# ローカルの Node で直接 pnpm dev する運用は想定していません。

services:
  dev:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "pnpm install && pnpm run dev -- --host"
    stdin_open: true
    tty: true